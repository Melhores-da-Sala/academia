<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>GSports Portal de Acesso</title>
</head>
<body>
    <div class="logo_portal_acesso_preta_painel">
        <img src="assets/logo.png" alt="GSports Logo">
    </div>
    <h1 class="titulo_portal_painel">Bem-vindo a Gsports!</h1>
    <h2 class="subtitulo_portal_painel">Escolha seu portal de acesso!</h2>
    <div class="grid_escolha_painel">
        <div class="escolha_aluno_painel">
            <img class="img_portal_aluno_painel" src="assets/portal aluno.png" alt="Ícone Aluno">
            <h1>Aluno</h1>
        </div>
        <div class="escolha_professor_painel">
            <img class="img_portal_professor_painel" src="assets/portal professor.png" alt="Ícone Professor">
            <h1>Professor</h1>
        </div>
    </div>
    <div class="escolha_botoes_painel">
        <a href="dashboardaluno.html">
            <button class="botao_p_aluno_painel">Entrar como aluno</button>
        </a>
        <small class="ou_painel">OU</small>
        <a href="dashboardprofessor.html">
            <button class="botao_p_professor_painel">Entrar como Professor</button>
        </a>
    </div>
    <script src="JS/contas.js"></script>
</body>
</html>
