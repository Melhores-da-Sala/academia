<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Painel do Aluno</title>
</head>
<body>



    <div class="painel_aluno_header_mobile">
        <div class="painel_aluno_dados_perfil">
            <div class="painel_aluno_foto_user">
                <i class="bi bi-person-circle"></i>
            </div>
            <div>
                <h2>Olá</h2>
                <small>Aluno</small>
            </div>
        </div>


    </div>
        <div class="painel_aluno_burguer" id="btnMenu">
            <i class="bi bi-list"></i>
    </div>
    
    <div class="menu_mobile_treinos" id="menuMobile">
        <a href="#" class="item_menu_mobile">
            <i class="bi bi-house"></i>
            <span>Início</span>
        </a>
        <a href="painel_aluno_treinos.html" class="item_menu_mobile">
            <i class="bi bi-stopwatch"></i>
            <span>Meus Treinos</span>
        </a>
        <a href="painel_aluno_nutricao.html" class="item_menu_mobile">
            <i class="bi bi-apple"></i>
            <span>Nutrição</span>
        </a>
        <a href="painel_aluno_relatorios.html" class="item_menu_mobile">
            <i class="bi bi-file-text-fill"></i>
            <span>Relatórios</span>
        </a>
        <a href="home.html" class="item_menu_mobile sair">
            <i class="bi bi-box-arrow-right"></i>
            <span>Sair</span>
        </a>
    </div>






    <div class="painel_aluno_sidebar">

        <div class="painel_aluno_dados_perfil">
            <div class="painel_aluno_foto_user">
                <i class="bi bi-person-circle"></i>
            </div>
            <div>
                <h2>Olá</h2>
                <small>Aluno</small>
            </div>
        </div>

        <div class="painel_aluno_nav_botoes">
            <a href="#" class="painel_aluno_esta_pagina">
                <i class="bi bi-columns-gap"></i>
                <small>Painel Principal</small>
            </a>

            <a href="painel_aluno_treinos.html">
                <i class="bi bi-stopwatch"></i>
                <small>Meus Treinos</small>
            </a>

            <a href="painel_aluno_nutricao.html">
                <i class="bi bi-apple"></i>
                <small>Nutrição</small>
            </a>

            <a href="painel_aluno_relatorios.html">
                <i class="bi bi-file-text-fill"></i>
                <small>Relatórios</small>
            </a>

            <a class="painel_aluno_sair" href="home.html">
                <i class="bi bi-box-arrow-right"></i>
                <small>Sair</small>
            </a>
        </div>

    </div>


    <div class="painel_aluno_painel_principal">
        <h1>Bem-vindo de volta</h1>

        <div class="painel_aluno_tres_blocos">
            <div class="painel_aluno_proximo_treino">
                <h2>Proximo treino</h2>

                <div class="painel_aluno_horario">
                    <i class="bi bi-clock"></i>
                    <small>14:00 Quarta-feira</small>
                </div>
                <a href="treinos_do_aluno.html">
                    <button>Ver detalhes</button>
                </a>
            </div>

            <div class="painel_aluno_progresso">
                <h2>Seu progresso</h2>

                <div class="painel_aluno_grafico" id="grafico"></div>
            </div>

            <div class="painel_aluno_mensagens">
                <h2>Mensagens recentes</h2>

                <div class="painel_aluno_conteudo_vazio">
                    <small>Nenhuma mensagem</small>
                </div>
            </div>
        </div>

        <div class="painel_aluno_atividades">
            <h2>Atividades</h2>

            <div>
                <i class="bi bi-heart-pulse"></i>
                <small>Cardio intenso</small>
            </div>
        </div>
    </div>
    <script src="JS/painel_aluno.js"></script>
</body>

</html>
